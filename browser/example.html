<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Ez in the browser</title>
</head>
<body>
  <h1>Ez in the browser</h1>

  <input id="nameBox" type="text" placeholder="Type your name">
  <button id="greetBtn" onclick="EzRuntime.call('greet')">Greet me</button>
  <p id="output"></p>

  <script src="ez.js"></script>

  <script type="text/ez">
    function "greet" = {
        let name = input.from("nameBox")
        print.console("Hi " + name)
    }

    function "Hello" = {
        print.console("Ez loaded and running in the browser!")
    }
    Hello
  </script>
</body>
</html>
